<!DOCTYPE html>
<html lang="en">
<head>


<title>UEB CfPC — School Management System</title>
<style>
  :root{
    --navy:#1F3A5F; --navy-dark:#152A45; --accent:#C9A227; --bg:#F4F6F9;
    --card:#ffffff; --border:#DDE3EC; --text:#1E2733; --muted:#6B7686;
    --danger:#C0392B; --danger-bg:#FCEBEA; --ok:#1E7A46; --ok-bg:#E7F5EC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;}
  .hidden{display:none !important;}
  button{cursor:pointer;font-family:inherit;}
  input,select,textarea{font-family:inherit;}

  /* ---------- Login screen ---------- */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--navy),var(--navy-dark));padding:20px;}
  .login-card{background:#fff;border-radius:14px;max-width:380px;width:100%;padding:28px 26px 22px;
    box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .login-logo{display:flex;justify-content:center;margin-bottom:10px;}
  .login-logo img{height:64px;}
  .login-card h1{font-size:17px;text-align:center;color:var(--navy-dark);margin:4px 0 2px;}
  .login-card .sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:18px;}
  .role-toggle{display:flex;background:#EEF1F6;border-radius:8px;padding:4px;margin-bottom:16px;}
  .role-toggle button{flex:1;border:none;background:transparent;padding:9px 4px;font-size:12.5px;
    font-weight:bold;border-radius:6px;color:var(--muted);}
  .role-toggle button.active{background:var(--navy);color:#fff;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:bold;color:var(--navy-dark);margin-bottom:4px;}
  .field input,.field select{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:7px;font-size:14px;}
  .login-btn{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:8px;
    font-weight:bold;font-size:14px;margin-top:6px;}
  .login-btn:hover{background:var(--navy-dark);}
  .login-error{background:var(--danger-bg);color:var(--danger);font-size:12.5px;padding:8px 10px;
    border-radius:6px;margin-bottom:10px;display:none;}
  .login-error.show{display:block;}
  .login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}

  /* ---------- App shell (admin + student) ---------- */
  .app{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{background:linear-gradient(135deg,var(--navy),var(--navy-dark));color:#fff;
    padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .topbar .brand img{height:34px;}
  .topbar .brand .t1{font-size:14px;font-weight:bold;}
  .topbar .brand .t2{font-size:10.5px;color:#cfd8e6;}
  .topbar .who{font-size:12px;color:#dbe4f0;}
  .topbar .logoutBtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.4);
    color:#fff;padding:7px 12px;border-radius:6px;font-size:12px;font-weight:bold;}
  .topbar .logoutBtn:hover{background:rgba(255,255,255,.24);}

  .body-flex{display:flex;flex:1;min-height:0;}

  /* admin sidebar */
  .sidebar{width:190px;background:#fff;border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;}
  .sidebar button{display:block;width:100%;text-align:left;background:transparent;border:none;
    padding:11px 18px;font-size:13px;color:var(--text);border-left:3px solid transparent;}
  .sidebar button:hover{background:#F3F6FA;}
  .sidebar button.active{background:#EAF0F9;border-left-color:var(--accent);color:var(--navy-dark);font-weight:bold;}

  .main{flex:1;padding:20px;overflow:auto;}
  .panel{display:none;}
  .panel.active{display:block;}
  h2.panel-title{margin:0 0 4px;font-size:19px;color:var(--navy-dark);}
  p.panel-sub{margin:0 0 16px;font-size:12.5px;color:var(--muted);}

  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;
    box-shadow:0 1px 4px rgba(20,30,50,.05);margin-bottom:16px;}
  .card h3{margin:0 0 10px;font-size:14px;color:var(--navy-dark);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:900px){.grid2{grid-template-columns:1fr;}}

  .btn{background:var(--navy);color:#fff;border:none;padding:8px 14px;border-radius:6px;
       font-size:12.5px;font-weight:bold;}
  .btn:hover{background:var(--navy-dark);}
  .btn.secondary{background:#fff;color:var(--navy-dark);border:1px solid var(--border);}
  .btn.secondary:hover{background:#F3F6FA;}
  .btn.danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f0c9c5;}
  .btn.danger:hover{background:#f8d9d6;}
  .btn.sm{padding:5px 9px;font-size:11.5px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}

  table.data{border-collapse:collapse;width:100%;font-size:12.5px;}
  table.data th{background:#EDF1F7;color:var(--navy-dark);padding:8px 7px;text-align:left;border:1px solid var(--border);}
  table.data td{padding:7px;border:1px solid var(--border);}
  table.data tr:nth-child(even){background:#FAFBFD;}
  .table-wrap{overflow-x:auto;}

  input.txt,select.sel,textarea.ta{border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:12.5px;width:100%;}
  textarea.ta{resize:vertical;min-height:50px;}
  .inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .inline-form .f{display:flex;flex-direction:column;gap:3px;}
  .inline-form label{font-size:11px;font-weight:bold;color:var(--muted);}
  .inline-form input,.inline-form select{padding:7px 8px;border:1px solid var(--border);border-radius:5px;font-size:12.5px;}

  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:bold;}
  .badge.ok{background:var(--ok-bg);color:var(--ok);}
  .badge.warn{background:#FFF3D6;color:#8a6d00;}

  .empty-note{color:var(--muted);font-size:12.5px;padding:14px;text-align:center;}

  .tabs2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .tab2{background:#fff;border:1px solid var(--border);padding:7px 14px;border-radius:7px;
        cursor:pointer;font-size:12.5px;font-weight:bold;color:var(--muted);}
  .tab2.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy-dark);
    color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.3);
    z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;}
  .toast.show{opacity:1;}

  .modal-bg{position:fixed;inset:0;background:rgba(20,30,50,.5);display:flex;align-items:center;
    justify-content:center;z-index:500;padding:16px;}
  .modal-bg.hidden{display:none;}
  .modal{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:88vh;overflow:auto;padding:20px;}
  .modal h3{margin:0 0 14px;font-size:15px;color:var(--navy-dark);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

  /* ---------- Timetable grid (shared admin+student) ---------- */
  table.tt{border-collapse:collapse;width:100%;min-width:900px;font-size:12px;}
  table.tt th{background:#EDF1F7;color:var(--navy-dark);padding:8px 5px;border:1px solid var(--border);text-align:center;}
  table.tt th.ph{background:var(--navy);color:#fff;}
  table.tt td{border:1px solid var(--border);padding:4px;text-align:center;}
  table.tt td.cls{background:#F7F9FC;font-weight:bold;white-space:nowrap;padding:8px 10px;text-align:left;color:var(--navy-dark);}
  table.tt select{width:100%;border:1px solid #dfe4ec;border-radius:4px;padding:4px 3px;font-size:11.5px;}
  table.tt td.clash select{background:var(--danger-bg);border-color:#E2554A;color:var(--danger);font-weight:bold;}
  table.tt .cellgrid{display:flex;flex-direction:column;gap:2px;}
  .clash-box{background:var(--danger-bg);border:1px solid #E2554A;color:var(--danger);padding:9px 12px;
    border-radius:8px;font-size:12.5px;margin-bottom:10px;display:none;}
  .clash-box.show{display:block;}

  /* ---------- Report card printable sheet ---------- */
  .rc-page{width:794px;max-width:100%;margin:0 auto;background:#fff;border:2px solid #000;padding:10px;}
  .rc-top{display:flex;align-items:stretch;border-bottom:3px solid #000;padding-bottom:8px;}
  .rc-logo img{height:70px;width:auto;display:block;}
  .rc-div{width:3px;background:#000;margin:0 12px;}
  .rc-title{flex:1;text-align:center;padding-left:6px;}
  .rc-title .since{font-weight:bold;font-size:12px;}
  .rc-title .main{font-weight:900;font-size:22px;font-family:'Times New Roman',serif;margin:2px 0;}
  .rc-title .managed{font-style:italic;font-weight:bold;font-size:12px;}
  .rc-title .subt{font-weight:900;font-size:16px;font-family:'Times New Roman',serif;margin-top:2px;}
  .rc-banner{background:#4a4a4a;color:#fff;text-align:center;font-weight:bold;font-size:13px;padding:6px 4px;}
  .rc-reporttitle{text-align:center;font-weight:900;font-size:17px;font-family:'Times New Roman',serif;
    border:2px solid #000;border-top:none;padding:7px 0;}
  .rc-info{border-left:2px solid #000;border-right:2px solid #000;border-bottom:2px solid #000;}
  .rc-info-row{display:flex;border-bottom:2px solid #000;}
  .rc-info-row:last-child{border-bottom:none;}
  .rc-info-label{width:150px;font-weight:bold;font-size:12px;padding:8px;border-right:2px solid #000;}
  .rc-info-val{flex:1;padding:8px;border-right:2px solid #000;font-size:12.5px;font-weight:bold;}
  .rc-info-label2{width:80px;font-weight:bold;font-size:12px;padding:8px;border-right:2px solid #000;}
  .rc-info-val2{width:180px;padding:8px;font-size:12.5px;font-weight:bold;}
  table.rc-marks{width:100%;border-collapse:collapse;border:2px solid #000;border-top:none;}
  table.rc-marks th{background:#4a4a4a;color:#fff;font-size:10.5px;padding:7px 3px;border:1px solid #000;}
  table.rc-marks td{border:1px solid #000;text-align:center;padding:6px 2px;font-size:12.5px;font-weight:bold;}
  .rc-syllabus-banner{background:#4a4a4a;color:#fff;text-align:center;font-weight:bold;font-size:14px;padding:6px 0;
    border-left:2px solid #000;border-right:2px solid #000;}
  table.rc-syl{width:100%;border-collapse:collapse;border:2px solid #000;border-top:none;}
  table.rc-syl th{background:#4a4a4a;color:#fff;font-size:12px;padding:6px 3px;border:1px solid #000;}
  table.rc-syl td{border:1px solid #000;padding:5px;font-size:11.5px;vertical-align:top;min-height:40px;}
  table.rc-comments{width:100%;border-collapse:collapse;border-left:2px solid #000;border-right:2px solid #000;border-bottom:2px solid #000;}
  table.rc-comments th{background:#4a4a4a;color:#fff;font-size:11px;padding:6px;border:1px solid #000;}
  table.rc-comments td{border:1px solid #000;padding:8px;font-size:11.5px;vertical-align:top;height:56px;}
  .rc-remarkbar{background:#4a4a4a;color:#fff;text-align:center;font-weight:bold;font-size:12px;padding:5px;
    border-left:2px solid #000;border-right:2px solid #000;}
  .rc-remarkbox{border:2px solid #000;border-top:none;height:44px;}
  .rc-footer{display:flex;justify-content:space-between;font-size:10.5px;font-weight:bold;padding:6px 4px 0;}

  @page{ size: A4 portrait; margin: 10mm; }

  #printArea{ display:none; }

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{display:block;position:absolute;top:0;left:0;width:100%;margin:0;padding:0;}
    .no-print{display:none !important;}
    .rc-page{width:190mm;max-width:190mm;margin:0 auto;}
    table.tt-print{width:100%;}
  }

  /* -------- Printable timetable sheets (built for #printArea) -------- */
  .tt-print-page{width:100%;}
  .tt-print-head{display:flex;align-items:center;gap:14px;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:10px;}
  .tt-print-head img{height:56px;}
  .tt-print-head .tp1{font-weight:900;font-size:18px;font-family:'Times New Roman',serif;}
  .tt-print-head .tp2{font-size:11px;font-weight:bold;color:#333;}
  .tt-print-title{text-align:center;font-weight:900;font-size:15px;font-family:'Times New Roman',serif;
    background:#4a4a4a;color:#fff;padding:6px 0;margin-bottom:10px;}
  table.tt-print{border-collapse:collapse;width:100%;font-size:11px;}
  table.tt-print th{background:#4a4a4a;color:#fff;padding:6px 4px;border:1px solid #000;text-align:center;}
  table.tt-print td{border:1px solid #000;padding:5px 4px;text-align:center;vertical-align:middle;}
  table.tt-print td.cls{background:#EDEDED;font-weight:bold;text-align:left;padding:6px 8px;white-space:nowrap;}
  table.tt-print .subj{font-weight:bold;}
  table.tt-print .tch{font-size:9.5px;color:#333;}
  .tt-print-foot{display:flex;justify-content:space-between;font-size:10px;font-weight:bold;margin-top:10px;}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><img id="loginLogo" src="" alt="logo"></div>
    <h1 id="loginSchoolName">UEB CfPC</h1>
    <div class="sub">School Management System</div>

    <div class="role-toggle">
      <button id="roleBtnAdmin" class="active" onclick="setLoginRole('admin')">Admin / Teacher</button>
      <button id="roleBtnStudent" onclick="setLoginRole('student')">Student / Parent</button>
    </div>

    <div class="login-error" id="loginError"></div>

    <div id="adminLoginFields">
      <div class="field">
        <label>Staff Password</label>
        <input type="password" id="adminPassInput" placeholder="Enter password">
      </div>
    </div>

    <div id="studentLoginFields" class="hidden">
      <div class="field">
        <label>Class</label>
        <select id="studentClassInput"></select>
      </div>
      <div class="field">
        <label>Roll Number</label>
        <input type="text" id="studentRollInput" placeholder="e.g. 5">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="studentPassInput" placeholder="Enter password">
      </div>
    </div>

    <button class="login-btn" onclick="attemptLogin()">Log In</button>
    
  </div>
</div>

<!-- ============ ADMIN APP ============ -->
<div id="adminApp" class="app hidden">
  <div class="topbar">
    <div class="brand"><img id="adminBrandLogo" src="" alt="logo">
      <div><div class="t1" id="adminBrandName">UEB CfPC</div><div class="t2">Admin Console</div></div>
    </div>
    <div class="row">
      <span class="who">Logged in as Staff</span>
      <button class="logoutBtn" onclick="logout()">Log Out</button>
    </div>
  </div>
  <div class="body-flex">
    <div class="sidebar" id="adminSidebar"></div>
    <div class="main" id="adminMain"></div>
  </div>
</div>

<!-- ============ STUDENT APP ============ -->
<div id="studentApp" class="app hidden">
  <div class="topbar">
    <div class="brand"><img id="studentBrandLogo" src="" alt="logo">
      <div><div class="t1" id="studentBrandName">UEB CfPC</div><div class="t2" id="studentWhoLine">Student Portal</div></div>
    </div>
    <button class="logoutBtn" onclick="logout()">Log Out</button>
  </div>
  <div class="main" id="studentMain" style="max-width:1000px;margin:0 auto;width:100%;"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>

const FIREBASE_ENABLED = !!(window.firebaseConfig && window.firebaseConfig.apiKey && window.firebaseConfig.apiKey !== "YOUR_API_KEY" && window.firebase);

  try{
    firebase.initializeApp(window.firebaseConfig);

const Store = {
  // Always returns a DB object fast (from local cache) while cloud data (if any) loads in the background.
  async load(){
    let local = null;
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) local = JSON.parse(raw);
    }catch(e){}

    if(!fbDocRef){
      const fresh = local || buildDefaultDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
      return fresh;
    }

    try{
      const snap = await fbDocRef.get();
      if(snap.exists && snap.data().db){
        const cloud = snap.data().db;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
        return cloud;
      } else {
        const fresh = local || buildDefaultDB();
        await fbDocRef.set({db: fresh, updatedAt: Date.now()});
        localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
        return fresh;
      }
    }catch(e){
      console.warn("Could not reach cloud database, using this device's local copy.", e);
      return local || buildDefaultDB();

      try{
        await fbDocRef.set({db, updatedAt: Date.now()});
      }catch(e){
        console.warn("Cloud sync failed, change was saved locally only.", e);
        toast("⚠ Saved on this device, but cloud sync failed");
      }
    }
  },
  // Fires whenever another device (e.g. Admin) saves new data, so this screen can refresh live.
  subscribeRemote(callback){
    if(!fbDocRef) return;
    fbDocRef.onSnapshot(snap=>{
      if(snap.exists && snap.data().db){
        callback(snap.data().db);
      }
    });
  }
};

let DB = buildDefaultDB();

function persist(){ Store.save(DB); }

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove("show"), 2200);
}

function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function openModal(html){

  document.getElementById("modalBg").classList.remove("hidden");
}
function closeModal(){
  document.getElementById("modalBg").classList.add("hidden");
}
document.getElementById("modalBg").addEventListener("click", (e)=>{

});

let loginRole = "admin";
let activeAdminTab = "dashboard";
let activeStudentId = null;

/* Called whenever fresh data arrives from the cloud (another device saved something),
   so the screen you're already looking at updates without needing a manual refresh. */
function refreshCurrentView(){
  if(!document.getElementById("adminApp").classList.contains("hidden")){
    showAdminPanel(activeAdminTab);
  } else if(!document.getElementById("studentApp").classList.contains("hidden") && activeStudentId){
    renderStudentApp(activeStudentId);
  } else {
    populateLoginBranding();
  }
}

function setLoginRole(role){
  loginRole = role;
  document.getElementById("roleBtnAdmin").classList.toggle("active", role==="admin");
  document.getElementById("roleBtnStudent").classList.toggle("active", role==="student");
  document.getElementById("adminLoginFields").classList.toggle("hidden", role!=="admin");
  document.getElementById("studentLoginFields").classList.toggle("hidden", role!=="student");
  document.getElementById("loginError").classList.remove("show");
}

function populateLoginBranding(){
  document.getElementById("loginLogo").src = DB.meta.logo;
  document.getElementById("loginSchoolName").textContent = DB.meta.schoolName;
  document.getElementById("adminBrandLogo").src = DB.meta.logo;
  document.getElementById("adminBrandName").textContent = DB.meta.schoolName;
  document.getElementById("studentBrandLogo").src = DB.meta.logo;
  document.getElementById("studentBrandName").textContent = DB.meta.schoolName;

  const clsSel = document.getElementById("studentClassInput");
  clsSel.innerHTML = DB.classes.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
}

function showLoginError(msg){
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.classList.add("show");
}

function attemptLogin(){
  if(loginRole === "admin"){
    const pass = document.getElementById("adminPassInput").value;
    if(pass !== DB.meta.adminPassword){
      showLoginError("Incorrect staff password.");
      return;
    }
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({role:"admin"}));
    enterAdminApp();
  } else {
    const cls = document.getElementById("studentClassInput").value;
    const roll = document.getElementById("studentRollInput").value.trim();
    const pass = document.getElementById("studentPassInput").value;
    const student = DB.students.find(s=> s.cls===cls && String(s.roll)===roll && s.password===pass);
    if(!student){
      showLoginError("No matching student found. Check class, roll number and password.");
      return;
    }
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({role:"student", studentId: student.id}));
    enterStudentApp(student.id);
  }
}

function logout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById("adminApp").classList.add("hidden");
  document.getElementById("studentApp").classList.add("hidden");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("adminPassInput").value = "";
  document.getElementById("studentRollInput").value = "";
  document.getElementById("studentPassInput").value = "";
  document.getElementById("loginError").classList.remove("show");
}

function enterAdminApp(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("studentApp").classList.add("hidden");
  document.getElementById("adminApp").classList.remove("hidden");
  buildAdminSidebar();
  showAdminPanel("dashboard");
}

function enterStudentApp(studentId){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("adminApp").classList.add("hidden");
  document.getElementById("studentApp").classList.remove("hidden");
  activeStudentId = studentId;
  renderStudentApp(studentId);
}

function tryResumeSession(){
  try{
    const raw = sessionStorage.getItem(SESSION_KEY);
    if(!raw) return;
    const sess = JSON.parse(raw);
    if(sess.role === "admin"){
      enterAdminApp();
    } else if(sess.role === "student"){
      const stillExists = DB.students.find(s=>s.id===sess.studentId);
      if(stillExists) enterStudentApp(sess.studentId);
      else sessionStorage.removeItem(SESSION_KEY);
    }
  }catch(e){}
}

function addClass(){
  const input = document.getElementById("newClassName");
  const name = input.value.trim();
  if(!name){ toast("Enter a class name"); return; }
  if(DB.classes.includes(name)){ toast("That class already exists"); return; }
  DB.classes.push(name);
  DB.timetable.days.forEach(day=>{
    DB.timetable.schedule[day] = DB.timetable.schedule[day] || {};
    DB.timetable.schedule[day][name] = DB.timetable.periodLabels.map(()=>["",""]);
  });
  persist();
  renderAdminClasses();
  toast("Class added");
}

function renameClass(idx){
  const oldName = DB.classes[idx];
  const newName = prompt("Rename class:", oldName);
  if(!newName || newName===oldName) return;
  if(DB.classes.includes(newName)){ toast("A class with that name already exists"); return; }
  DB.classes[idx] = newName;
  DB.timetable.days.forEach(day=>{
    if(DB.timetable.schedule[day] && DB.timetable.schedule[day][oldName]){
      DB.timetable.schedule[day][newName] = DB.timetable.schedule[day][oldName];
      delete DB.timetable.schedule[day][oldName];
    }
  });
  DB.students.forEach(s=>{ if(s.cls===oldName) s.cls = newName; });
  persist();
  renderAdminClasses();
  toast("Class renamed");
}

function deleteClass(idx){
  const name = DB.classes[idx];
  const studentCount = DB.students.filter(s=>s.cls===name).length;
  const msg = studentCount>0
    ? `"${name}" has ${studentCount} student(s) enrolled. Delete anyway? Their class field will need reassigning.`
    : `Delete class "${name}"? This also removes its timetable rows.`;
  if(!confirm(msg)) return;
  DB.classes.splice(idx,1);
  DB.timetable.days.forEach(day=>{
    if(DB.timetable.schedule[day]) delete DB.timetable.schedule[day][name];
  });
  persist();
  renderAdminClasses();
  toast("Class deleted");
}

/* Shared engine used by both the Admin editor and the read-only Student view. */

const NON_TEACHER_CODES = ["", "P.E", "DOUBT", "C A Foundation", "Review Needed"];
let ttCurrentDay = null;

function computeClashes(day){
  const clashSet = new Set();
  const perPeriod = {};
  DB.classes.forEach((cls, ci)=>{
    const row = (DB.timetable.schedule[day] && DB.timetable.schedule[day][cls]) || [];
    row.forEach((pair, pi)=>{
      const teacher = pair[1];
      if(NON_TEACHER_CODES.includes(teacher)) return;
      perPeriod[pi] = perPeriod[pi] || {};
      perPeriod[pi][teacher] = perPeriod[pi][teacher] || [];
      perPeriod[pi][teacher].push(ci);
    });
  });
  const clashDetails = [];
  Object.keys(perPeriod).forEach(pi=>{
    Object.keys(perPeriod[pi]).forEach(teacher=>{
      const classIdxs = perPeriod[pi][teacher];
      if(classIdxs.length>1){
        classIdxs.forEach(ci=>clashSet.add(ci+"-"+pi));
        clashDetails.push({period: DB.timetable.periodLabels[pi].split("\n")[0], teacher,
          classes: classIdxs.map(ci=>DB.classes[ci])});
      }
    });
  });
  return {clashSet, clashDetails};
}

        </div>

function optionsHTML(list, selected){
  return list.map(v=>{
    const label = v===""?"—":v;

function renderTtTable(){
  const {clashSet, clashDetails} = computeClashes(ttCurrentDay);
  const box = document.getElementById("ttClashBox");
  if(clashDetails.length===0){ box.classList.remove("show"); box.innerHTML=""; }
  else{
    box.classList.add("show");
    box.innerHTML = `<b>⚠ ${clashDetails.length} clash${clashDetails.length>1?"es":""} on ${ttCurrentDay}:</b><br>` +
      clashDetails.map(c=>`Teacher <b>${escapeHtml(c.teacher)}</b> double-booked in <b>${escapeHtml(c.period)}</b>: ${c.classes.map(escapeHtml).join(", ")}`).join("<br>");
  }

  const teacherCodes = ["", ...DB.teachers.map(t=>t.code), "Review Needed"];
  const subjectList = DB.timetable.subjectsList && DB.timetable.subjectsList.length ? DB.timetable.subjectsList : DB.subjects.map(s=>s.label);

  let html = `<table class="tt"><thead><tr><th>Class / Batch</th>`;
  DB.timetable.periodLabels.forEach(p=>{
    const parts = p.split("\n");
    html += `<th class="ph">${parts[0]}<br><span style="font-weight:normal;font-size:10.5px;">${parts[1]||""}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  DB.classes.forEach((cls, ci)=>{
    html += `<tr><td class="cls">${escapeHtml(cls)}</td>`;
    const row = (DB.timetable.schedule[ttCurrentDay] && DB.timetable.schedule[ttCurrentDay][cls]) ||
                DB.timetable.periodLabels.map(()=>["",""]);
    row.forEach((pair, pi)=>{
      const isClash = clashSet.has(ci+"-"+pi);
      html += `<td class="${isClash?"clash":""}">
        <div class="cellgrid">
          <select data-ci="${ci}" data-pi="${pi}" data-field="0" onchange="onTtCellChange(this)">${optionsHTML(subjectList, pair[0])}</select>
          <select data-ci="${ci}" data-pi="${pi}" data-field="1" onchange="onTtCellChange(this)">${optionsHTML(teacherCodes, pair[1])}</select>
        </div>
      </td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById("ttHost").innerHTML = html;
}

function onTtCellChange(el){
  const ci = +el.dataset.ci, pi = +el.dataset.pi, field = +el.dataset.field;
  const cls = DB.classes[ci];
  DB.timetable.schedule[ttCurrentDay] = DB.timetable.schedule[ttCurrentDay] || {};
  DB.timetable.schedule[ttCurrentDay][cls] = DB.timetable.schedule[ttCurrentDay][cls] || DB.timetable.periodLabels.map(()=>["",""]);
  DB.timetable.schedule[ttCurrentDay][cls][pi][field] = el.value;
  persist();
  renderTtTable();
}

/* ------------------------------- REPORT CARDS -------------------------------- */
/* Shared printable-card renderer used by both Admin preview and Student view. */

function subjectByKey(key){ return DB.subjects.find(s=>s.key===key) || {key,label:key,max:100}; }

function monthName(m){ return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1] || ""; }

function renderReportCardHTML(student, entry){
  const subjKeys = entry.subjects || [];
  let total=0, maxTotal=0;
  const marksCells = subjKeys.map(k=>{
    const sub = subjectByKey(k);
    const val = entry.marks[k]||0;
    total += Number(val); maxTotal += Number(sub.max);
    return `<td>${val}</td>`;
  }).join("");
  const headerCells = subjKeys.map(k=>{
    const sub = subjectByKey(k);
    return `<th>${escapeHtml(sub.label)}<br>(${sub.max})</th>`;
  }).join("");

  const dateObj = entry.date ? new Date(entry.date) : null;
  const dateStr = dateObj && !isNaN(dateObj) ? `${dateObj.getDate()} ${monthName(dateObj.getMonth()+1)} ${dateObj.getFullYear()}` : (entry.date||"—");

  const syllabusRows = subjKeys.map(k=>{
    const sub = subjectByKey(k);
    return `<tr><td style="font-weight:bold;text-align:center;background:#fff;">${escapeHtml(sub.label)}</td>
      <td>${escapeHtml((entry.syllabus&&entry.syllabus[k])||"")}</td></tr>`;
  }).join("");

  return `
  <div class="rc-page">
    <div class="rc-top">
      <div class="rc-logo"><img src="${DB.meta.logo}"></div>
      <div class="rc-div"></div>
      <div class="rc-title">
        <div class="since">${escapeHtml(DB.meta.since||"")}</div>
        <div class="main">${escapeHtml(DB.meta.schoolName)}</div>
        <div class="managed">${escapeHtml(DB.meta.managed||"")}</div>
        <div class="subt">${escapeHtml(DB.meta.fullName)}</div>
      </div>
    </div>
    <div class="rc-banner">STUDENT PROGRESS REPORT</div>
    <div class="rc-reporttitle">TEST — ${entry.testNo}</div>
    <div class="rc-info">
      <div class="rc-info-row">
        <div class="rc-info-label">STUDENT'S NAME:</div>
        <div class="rc-info-val">${escapeHtml(student.name)}</div>
        <div class="rc-info-label2">CLASS:</div>
        <div class="rc-info-val2">${escapeHtml(student.cls)}</div>
      </div>
      <div class="rc-info-row">
        <div class="rc-info-label">FATHER'S NAME:</div>
        <div class="rc-info-val">${escapeHtml(student.fatherName||"")}</div>
        <div class="rc-info-label2">DATE:</div>
        <div class="rc-info-val2">${dateStr}</div>
      </div>
      <div class="rc-info-row">
        <div class="rc-info-label">ROLL NO.:</div>
        <div class="rc-info-val">${escapeHtml(student.roll)}</div>
        <div class="rc-info-label2">TOTAL:</div>
        <div class="rc-info-val2">${total} / ${maxTotal}</div>
      </div>
    </div>
    <table class="rc-marks">
      <thead><tr><th style="width:9%;">TEST NO.</th>${headerCells}<th style="width:12%;">TOTAL</th></tr></thead>
      <tbody><tr><td class="testno">${entry.testNo}</td>${marksCells}<td>${total}</td></tr></tbody>
    </table>
    <div class="rc-syllabus-banner">SYLLABUS COVERED</div>
    <table class="rc-syl">
      <thead><tr><th style="width:20%;">SUBJECT</th><th>CHAPTERS / TOPICS</th></tr></thead>
      <tbody>${syllabusRows}</tbody>
    </table>
    <table class="rc-comments">
      <thead><tr><th>CLASS TEACHER COMMENTS</th><th>PARENT COMMENTS</th><th>SUBJECT TEACHER COMMENTS</th></tr></thead>
      <tbody><tr>
        <td>${escapeHtml((entry.comments&&entry.comments.classTeacher)||"")}</td>
        <td>${escapeHtml((entry.comments&&entry.comments.parent)||"")}</td>
        <td>${escapeHtml((entry.comments&&entry.comments.subjectTeacher)||"")}</td>
      </tr></tbody>
    </table>
    <div class="rc-remarkbar">HEAD OF INSTITUTE REMARK &amp; SIGNATURE:</div>
    <div class="rc-remarkbox"></div>
    <div class="rc-footer">
      <span>${escapeHtml(DB.meta.footerLine1||"")}</span>
      <span>${escapeHtml(DB.meta.footerLine2||"")}</span>
    </div>
  </div>`;
}

let rcSelectedClass = "";
let rcSelectedStudentId = "";

function renderAdminReportCards(){
  const classStudents = DB.students.filter(s=> !rcSelectedClass || s.cls===rcSelectedClass);
  if(rcSelectedStudentId && !classStudents.find(s=>s.id===rcSelectedStudentId)) rcSelectedStudentId = "";

  mainEl().innerHTML = `
    <h2 class="panel-title">Report Cards</h2>
    <p class="panel-sub">Pick a class and student, then add or edit a test's marks, syllabus and comments.</p>
    <div class="card">
      <div class="inline-form">
        <div class="f"><label>Class</label>
          <select class="sel" id="rcClassSel" onchange="rcSelectedClass=this.value; rcSelectedStudentId=''; renderAdminReportCards();">
            <option value="">-- Select class --</option>
            ${DB.classes.map(c=>`<option value="${escapeHtml(c)}" ${rcSelectedClass===c?"selected":""}>${escapeHtml(c)}</option>`).join("")}
          </select>
        </div>
        <div class="f"><label>Student</label>
          <select class="sel" id="rcStuSel" onchange="rcSelectedStudentId=this.value; renderAdminReportCards();">
            <option value="">-- Select student --</option>
            ${classStudents.map(s=>`<option value="${s.id}" ${rcSelectedStudentId===s.id?"selected":""}>${escapeHtml(s.name)} (Roll ${escapeHtml(s.roll)})</option>`).join("")}
          </select>
        </div>
        ${rcSelectedStudentId ? `<button class="btn" onclick="openTestEditor(null)">+ Add New Test</button>` : ""}
      </div>
    </div>
    <div id="rcTestList"></div>
  `;
  if(rcSelectedStudentId) renderRcTestList();
}

function renderRcTestList(){
  const student = DB.students.find(s=>s.id===rcSelectedStudentId);
  const tests = (DB.reportCards[rcSelectedStudentId]||[]).slice().sort((a,b)=>a.testNo-b.testNo);
  document.getElementById("rcTestList").innerHTML = `
    <div class="card table-wrap">
      <h3>Saved Tests for ${escapeHtml(student.name)}</h3>
      ${tests.length ? `
      <table class="data">
        <thead><tr><th>Test No.</th><th>Date</th><th>Subjects</th><th style="width:220px;">Actions</th></tr></thead>
        <tbody>
          ${tests.map(t=>`
            <tr>
              <td>Test ${t.testNo}</td>
              <td>${escapeHtml(t.date||"—")}</td>
              <td>${t.subjects.map(k=>escapeHtml(subjectByKey(k).label)).join(", ")}</td>
              <td>
                <button class="btn secondary sm" onclick="openTestEditor(${t.testNo})">Edit</button>
                <button class="btn secondary sm" onclick="previewReportCard(${t.testNo})">Preview / Print</button>
                <button class="btn danger sm" onclick="deleteTest(${t.testNo})">Delete</button>
              </td>
            </tr>`).join("")}
        </tbody>
      </table>` : `<div class="empty-note">No tests recorded yet for this student.</div>`}
    </div>
  `;
}

function openTestEditor(testNo){
  const existing = testNo!=null ? (DB.reportCards[rcSelectedStudentId]||[]).find(t=>t.testNo===testNo) : null;
  const entry = existing || {testNo: nextTestNo(), date:"", subjects:[], marks:{}, syllabus:{}, comments:{classTeacher:"",parent:"",subjectTeacher:""}};

  const subjCheckboxes = DB.subjects.map(s=>{
    const checked = entry.subjects.includes(s.key);
    return `
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;">
        <input type="checkbox" data-subjkey="${s.key}" ${checked?"checked":""} onchange="toggleSubjRow(this)">
        ${escapeHtml(s.label)} (max ${s.max})
      </label>`;
  }).join("");

  const marksRowsHtml = entry.subjects.map(k=>subjMarkRowHtml(k, entry)).join("");
  const syllabusRowsHtml = entry.subjects.map(k=>subjSyllabusRowHtml(k, entry)).join("");

  openModal(`
    <h3>${existing?"Edit":"Add"} Test — ${escapeHtml(DB.students.find(s=>s.id===rcSelectedStudentId).name)}</h3>
    <div class="inline-form" style="margin-bottom:12px;">
      <div class="f"><label>Test No.</label><input class="txt" id="teTestNo" type="number" value="${entry.testNo}" style="width:80px;"></div>
      <div class="f"><label>Date</label><input class="txt" id="teDate" type="date" value="${entry.date||""}"></div>
    </div>
    <div class="f" style="margin-bottom:12px;">
      <label style="font-size:11px;font-weight:bold;color:var(--muted);">Subjects included</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">${subjCheckboxes}</div>
    </div>
    <div id="teMarksRows">${marksRowsHtml}</div>
    <div id="teSyllabusRows">${syllabusRowsHtml}</div>
    <div class="grid2" style="margin-top:12px;">
      <div class="f"><label style="font-size:11px;font-weight:bold;color:var(--muted);">Class Teacher Comments</label>
        <textarea class="ta" id="teCommentClass">${escapeHtml(entry.comments.classTeacher||"")}</textarea></div>
      <div class="f"><label style="font-size:11px;font-weight:bold;color:var(--muted);">Parent Comments</label>
        <textarea class="ta" id="teCommentParent">${escapeHtml(entry.comments.parent||"")}</textarea></div>
    </div>
    <div class="f" style="margin-top:10px;"><label style="font-size:11px;font-weight:bold;color:var(--muted);">Subject Teacher Comments</label>
      <textarea class="ta" id="teCommentSubject">${escapeHtml(entry.comments.subjectTeacher||"")}</textarea></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveTestEditor(${existing?entry.testNo:"null"})">Save Test</button>
    </div>
  `);
}

function nextTestNo(){
  const tests = DB.reportCards[rcSelectedStudentId]||[];
  return tests.length ? Math.max(...tests.map(t=>t.testNo))+1 : 1;
}

function subjMarkRowHtml(key, entry){
  const sub = subjectByKey(key);
  const val = entry.marks[key]!=null ? entry.marks[key] : "";
  return `<div class="row" data-marksrow="${key}" style="margin-bottom:6px;">
    <div style="width:150px;font-size:12.5px;font-weight:bold;">${escapeHtml(sub.label)}</div>
    <input class="txt" type="number" min="0" max="${sub.max}" style="width:90px;" data-markinput="${key}" value="${val}" placeholder="/ ${sub.max}">
  </div>`;
}
function subjSyllabusRowHtml(key, entry){
  const sub = subjectByKey(key);
  const val = (entry.syllabus&&entry.syllabus[key])||"";
  return `<div data-syllrow="${key}" style="margin-bottom:6px;">
    <label style="font-size:11px;font-weight:bold;color:var(--muted);">${escapeHtml(sub.label)} — syllabus / chapters</label>
    <textarea class="ta" data-syllinput="${key}" style="min-height:36px;">${escapeHtml(val)}</textarea>
  </div>`;
}

function toggleSubjRow(cb){
  const key = cb.dataset.subjkey;
  const marksHost = document.getElementById("teMarksRows");
  const syllHost = document.getElementById("teSyllabusRows");
  if(cb.checked){
    marksHost.insertAdjacentHTML("beforeend", subjMarkRowHtml(key, {marks:{}}));
    syllHost.insertAdjacentHTML("beforeend", subjSyllabusRowHtml(key, {syllabus:{}}));
  } else {
    const mr = marksHost.querySelector(`[data-marksrow="${key}"]`); if(mr) mr.remove();
    const sr = syllHost.querySelector(`[data-syllrow="${key}"]`); if(sr) sr.remove();
  }
}

function saveTestEditor(oldTestNo){
  const testNo = parseInt(document.getElementById("teTestNo").value,10);
  if(!testNo){ toast("Enter a valid test number"); return; }
  const date = document.getElementById("teDate").value;
  const subjKeys = Array.from(document.querySelectorAll('#teMarksRows [data-marksrow]')).map(el=>el.dataset.marksrow);
  const marks = {}; subjKeys.forEach(k=>{
    const input = document.querySelector(`[data-markinput="${k}"]`);
    marks[k] = input ? (parseInt(input.value,10)||0) : 0;
  });
  const syllabus = {}; subjKeys.forEach(k=>{
    const ta = document.querySelector(`[data-syllinput="${k}"]`);
    syllabus[k] = ta ? ta.value : "";
  });
  const comments = {
    classTeacher: document.getElementById("teCommentClass").value,
    parent: document.getElementById("teCommentParent").value,
    subjectTeacher: document.getElementById("teCommentSubject").value
  };

  DB.reportCards[rcSelectedStudentId] = DB.reportCards[rcSelectedStudentId] || [];
  let arr = DB.reportCards[rcSelectedStudentId];
  if(oldTestNo!=null) arr = arr.filter(t=>t.testNo!==oldTestNo);
  arr = arr.filter(t=>t.testNo!==testNo);
  arr.push({testNo, date, subjects: subjKeys, marks, syllabus, comments});
  DB.reportCards[rcSelectedStudentId] = arr;
  persist();
  closeModal();
  renderRcTestList();
  toast("Report card saved");
}

function deleteTest(testNo){
  if(!confirm(`Delete Test ${testNo} for this student?`)) return;
  DB.reportCards[rcSelectedStudentId] = (DB.reportCards[rcSelectedStudentId]||[]).filter(t=>t.testNo!==testNo);
  persist();
  renderRcTestList();
  toast("Test deleted");
}

function previewReportCard(testNo){
  const student = DB.students.find(s=>s.id===rcSelectedStudentId);
  const entry = (DB.reportCards[rcSelectedStudentId]||[]).find(t=>t.testNo===testNo);
  if(!student || !entry) return;
  openModal(`
    <div style="max-width:100%;overflow:auto;">${renderReportCardHTML(student, entry)}</div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Close</button>
      <button class="btn" onclick="printCurrentCard('${student.id}', ${testNo})">Print</button>
    </div>
  `);
}

function getPrintArea(){
  let printArea = document.getElementById("printArea");
  if(!printArea){
    printArea = document.createElement("div");
    printArea.id = "printArea";
    document.body.appendChild(printArea);
  }
  return printArea;
}

/* A4 size + orientation for whatever is about to be printed. Chrome/Edge/Firefox
   all honour a dynamically-injected @page rule, so we swap it right before
   window.print() and leave it as the default afterwards. */
function setPrintOrientation(orientation){
  let style = document.getElementById("dynPageStyle");
  if(!style){
    style = document.createElement("style");
    style.id = "dynPageStyle";
    document.head.appendChild(style);
  }
  style.textContent = `@page{ size: A4 ${orientation}; margin: 10mm; }`;
}

function printCurrentCard(studentId, testNo){
  const student = DB.students.find(s=>s.id===studentId);
  const entry = (DB.reportCards[studentId]||[]).find(t=>t.testNo===testNo);
  if(!student || !entry) return;
  getPrintArea().innerHTML = renderReportCardHTML(student, entry);
  setPrintOrientation("portrait");
  window.print();
}

function timetablePrintHeadHTML(subtitle){
  return `
    <div class="tt-print-head">
      <img src="${DB.meta.logo}">

        <div class="tp1">${escapeHtml(DB.meta.schoolName)}</div>
        <div class="tp2">${escapeHtml(DB.meta.fullName)}</div>
      </div>
    </div>
    <div class="tt-print-title">${escapeHtml(subtitle)}</div>
  `;
}

function timetablePrintFootHTML(){
  return `<div class="tt-print-foot">
    <span>${escapeHtml(DB.meta.footerLine1||"")}</span>
    <span>${escapeHtml(DB.meta.footerLine2||"")}</span>
  </div>`;
}

/* Print one day's grid, every class — landscape (17 classes fit better as wide rows). */
function printTimetableDay(day){
  let html = `<div class="tt-print-page">`;
  html += timetablePrintHeadHTML(`WEEKLY TIME TABLE — ${day.toUpperCase()}`);
  html += `<table class="tt-print"><thead><tr><th style="text-align:left;">Class</th>`;
  DB.timetable.periodLabels.forEach(p=>{
    const parts = p.split("\n");
    html += `<th>${escapeHtml(parts[0])}<br><span style="font-weight:normal;">${escapeHtml(parts[1]||"")}</span></th>`;
  });
  html += `</tr></thead><tbody>`;
  DB.classes.forEach(cls=>{
    const row = (DB.timetable.schedule[day] && DB.timetable.schedule[day][cls]) || DB.timetable.periodLabels.map(()=>["",""]);
    html += `<tr><td class="cls">${escapeHtml(cls)}</td>`;
    row.forEach(pair=>{
      const teacher = DB.teachers.find(t=>t.code===pair[1]);
      html += `<td><div class="subj">${escapeHtml(pair[0]||"—")}</div>${pair[1]?`<div class="tch">${escapeHtml(teacher?teacher.name:pair[1])}</div>`:""}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  html += timetablePrintFootHTML();
  html += `</div>`;
  getPrintArea().innerHTML = html;
  setPrintOrientation("landscape");
  window.print();
}

/* Print one class's full week — portrait (days as rows, periods as columns). Used by
   both Admin (any class) and the Student portal (their own class). */
function printTimetableWeek(cls){
  let html = `<div class="tt-print-page">`;
  html += timetablePrintHeadHTML(`WEEKLY TIME TABLE — ${cls.toUpperCase()}`);
  html += `<table class="tt-print"><thead><tr><th style="text-align:left;">Day</th>`;
  DB.timetable.periodLabels.forEach(p=>{
    const parts = p.split("\n");
    html += `<th>${escapeHtml(parts[0])}<br><span style="font-weight:normal;">${escapeHtml(parts[1]||"")}</span></th>`;
  });
  html += `</tr></thead><tbody>`;
  DB.timetable.days.forEach(day=>{
    const row = (DB.timetable.schedule[day] && DB.timetable.schedule[day][cls]) || DB.timetable.periodLabels.map(()=>["",""]);
    html += `<tr><td class="cls">${escapeHtml(day)}</td>`;
    row.forEach(pair=>{
      const teacher = DB.teachers.find(t=>t.code===pair[1]);
      html += `<td><div class="subj">${escapeHtml(pair[0]||"—")}</div>${pair[1]?`<div class="tch">${escapeHtml(teacher?teacher.name:pair[1])}</div>`:""}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  html += timetablePrintFootHTML();
  html += `</div>`;
  getPrintArea().innerHTML = html;
  setPrintOrientation("portrait");
  window.print();
}

function saveSchoolSettings(){
  DB.meta.schoolName = document.getElementById("setSchoolName").value.trim() || DB.meta.schoolName;
  DB.meta.fullName = document.getElementById("setFullName").value.trim();
  DB.meta.since = document.getElementById("setSince").value.trim();
  DB.meta.managed = document.getElementById("setManaged").value.trim();
  DB.meta.footerLine1 = document.getElementById("setFooter1").value.trim();
  DB.meta.footerLine2 = document.getElementById("setFooter2").value.trim();
  persist();
  populateLoginBranding();
  toast("Settings saved");
}

function onLogoFileChosen(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    DB.meta.logo = reader.result;
    persist();
    populateLoginBranding();
    renderAdminSettings();
    toast("Logo updated");
  };
  reader.readAsDataURL(file);
}

function saveAdminPassword(){
  const np = document.getElementById("setAdminPass").value;
  if(!np){ toast("Enter a new password first"); return; }
  DB.meta.adminPassword = np;
  persist();
  document.getElementById("setAdminPass").value = "";
  toast("Password updated");
}

/* -------------------------------- BACKUP / RESTORE --------------------------------- */

function renderAdminBackup(){
  mainEl().innerHTML = `
    <h2 class="panel-title">Backup / Restore</h2>
    <p class="panel-sub">Everything lives in this browser only. Export a data file to back it up or move it to another device; import it there to bring the data across.</p>
    <div class="card">
      <h3>Export</h3>
      <p style="font-size:12.5px;color:var(--muted);">Downloads the full database (classes, teachers, subjects, students, timetable, report cards) as one JSON file.</p>
      <button class="btn" onclick="exportDB()">Export Data (.json)</button>
    </div>
    <div class="card">
      <h3>Import</h3>
      <p style="font-size:12.5px;color:var(--muted);">Replaces ALL current data on this device with the contents of the file you choose. This cannot be undone.</p>
      <input type="file" accept=".json" id="importFileInput" onchange="importDB(event)">
    </div>
    <div class="card">
      <h3>Reset</h3>
      <p style="font-size:12.5px;color:var(--muted);">Wipes this device's data back to the original demo dataset.</p>
      <button class="btn danger" onclick="resetDB()">Reset to Demo Data</button>
    </div>
    <div class="card">
      <h3>Cross-device sync (upgrade path)</h3>
      <p style="font-size:12.5px;color:var(--muted);line-height:1.6;">
        To make Admin edits show up automatically on Students' own phones, the <code>Store.load()</code> and
        <code>Store.save()</code> functions near the top of the script need to talk to a real backend instead
        of <code>localStorage</code> — for example Firebase Realtime Database, a Google Sheet via Apps Script,
        or a small PHP/MySQL API. The rest of the app already reads/writes through those two functions only,
        so that swap doesn't require touching the UI code.
      </p>
    </div>
  `;
}

function exportDB(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (DB.meta.schoolName||"school").replace(/\s+/g,"_") + "_SMS_data.json";
  a.click();
}

function importDB(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.classes || !parsed.students || !parsed.timetable) throw new Error("bad format");
      DB = parsed;
      persist();
      populateLoginBranding();
      buildAdminSidebar();
      showAdminPanel("dashboard");
      toast("Data imported");
    }catch(e){
      alert("Could not import: this doesn't look like a valid backup file.");
    }
  };
  reader.readAsText(file);
}

function resetDB(){
  if(!confirm("This wipes ALL current data on this device and restores the original demo dataset. Continue?")) return;
  DB = buildDefaultDB();
  persist();
  populateLoginBranding();
  buildAdminSidebar();
  showAdminPanel("dashboard");
  toast("Data reset");
}

/* ================================ STUDENT / PARENT PORTAL ================================ */

let stuActiveTab = "timetable";
let stuCurrentDay = null;
let stuSelectedTestNo = null;

function renderStudentApp(studentId){
  const student = DB.students.find(s=>s.id===studentId);
  if(!student){ logout(); return; }
  document.getElementById("studentWhoLine").textContent = `${student.name} · ${student.cls} · Roll ${student.roll}`;
  stuCurrentDay = stuCurrentDay || DB.timetable.days[0];
  const tests = (DB.reportCards[studentId]||[]).slice().sort((a,b)=>a.testNo-b.testNo);
  stuSelectedTestNo = stuSelectedTestNo || (tests.length ? tests[tests.length-1].testNo : null);

  document.getElementById("studentMain").innerHTML = `
    <div class="tabs2 no-print">
      <div class="tab2 ${stuActiveTab==='timetable'?'active':''}" onclick="stuActiveTab='timetable'; renderStudentApp('${studentId}');">My Timetable</div>
      <div class="tab2 ${stuActiveTab==='reportcard'?'active':''}" onclick="stuActiveTab='reportcard'; renderStudentApp('${studentId}');">My Report Card</div>
      <div class="tab2 ${stuActiveTab==='profile'?'active':''}" onclick="stuActiveTab='profile'; renderStudentApp('${studentId}');">Profile</div>
    </div>
    <div id="stuPanelHost"></div>
  `;

  if(stuActiveTab==="timetable") renderStudentTimetable(student);
  else if(stuActiveTab==="reportcard") renderStudentReportCard(student, tests);
  else renderStudentProfile(student);
}

function renderStudentTimetable(student){
  const host = document.getElementById("stuPanelHost");
  host.innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h3 style="margin:0;">Timetable — ${escapeHtml(student.cls)}</h3>
        <button class="btn secondary sm no-print" onclick="printTimetableWeek('${escapeHtml(student.cls)}')">🖨 Print Full Week (A4)</button>
      </div>
      <div class="tabs2" style="margin-top:10px;">
        ${DB.timetable.days.map(day=>`<div class="tab2 ${day===stuCurrentDay?'active':''}" onclick="stuCurrentDay='${day}'; renderStudentApp('${student.id}');">${day}</div>`).join("")}
      </div>
      <div id="stuTtHost" class="table-wrap"></div>
    </div>
  `;
  const row = (DB.timetable.schedule[stuCurrentDay] && DB.timetable.schedule[stuCurrentDay][student.cls]) ||
              DB.timetable.periodLabels.map(()=>["",""]);
  let html = `<table class="tt"><thead><tr>`;
  DB.timetable.periodLabels.forEach(p=>{
    const parts = p.split("\n");
    html += `<th class="ph">${parts[0]}<br><span style="font-weight:normal;font-size:10.5px;">${parts[1]||""}</span></th>`;
  });
  html += `</tr></thead><tbody><tr>`;
  row.forEach(pair=>{
    const subj = pair[0] || "—";
    const teacherCode = pair[1] || "";
    const teacher = DB.teachers.find(t=>t.code===teacherCode);
    html += `<td style="padding:10px 6px;">
      <div style="font-weight:bold;">${escapeHtml(subj)}</div>
      ${teacherCode ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">${escapeHtml(teacher?teacher.name:teacherCode)}</div>` : ""}
    </td>`;
  });
  html += `</tr></tbody></table>`;
  document.getElementById("stuTtHost").innerHTML = html;
}

function renderStudentReportCard(student, tests){
  const host = document.getElementById("stuPanelHost");
  if(!tests.length){
    host.innerHTML = `<div class="card"><div class="empty-note">No report cards have been filed for you yet. Check back after the next test.</div></div>`;
    return;
  }
  host.innerHTML = `
    <div class="card no-print">
      <div class="inline-form">
        <div class="f"><label>Select test</label>
          <select class="sel" onchange="stuSelectedTestNo=parseInt(this.value,10); renderStudentApp('${student.id}');">
            ${tests.map(t=>`<option value="${t.testNo}" ${t.testNo===stuSelectedTestNo?"selected":""}>Test ${t.testNo}${t.date?" — "+escapeHtml(t.date):""}</option>`).join("")}
          </select>
        </div>
        <button class="btn secondary" onclick="printCurrentCard('${student.id}', ${(tests.find(t=>t.testNo===stuSelectedTestNo)||tests[tests.length-1]).testNo})">🖨 Print This Report (A4)</button>
      </div>
    </div>
    <div id="stuRcHost" style="overflow:auto;"></div>
  `;
  const entry = tests.find(t=>t.testNo===stuSelectedTestNo) || tests[tests.length-1];
  document.getElementById("stuRcHost").innerHTML = renderReportCardHTML(student, entry);
}

function renderStudentProfile(student){
  document.getElementById("stuPanelHost").innerHTML = `
    <div class="card">
      <h3>Profile</h3>
      <table class="data">
        <tbody>
          <tr><th style="width:160px;">Name</th><td>${escapeHtml(student.name)}</td></tr>
          <tr><th>Class</th><td>${escapeHtml(student.cls)}</td></tr>
          <tr><th>Roll No.</th><td>${escapeHtml(student.roll)}</td></tr>
          <tr><th>Father's Name</th><td>${escapeHtml(student.fatherName||"—")}</td></tr>
        </tbody>
      </table>
      <p style="font-size:11.5px;color:var(--muted);margin-top:10px;">To change your password, ask your class teacher / admin.</p>
    </div>
  `;
}

/* ================================ INIT ================================ */

(async function initApp(){
  // Show a tiny loading state on the login card while we check for cloud data.
  const loginBtn = document.querySelector(".login-btn");
  if(loginBtn){ loginBtn.disabled = true; loginBtn.textContent = "Loading…"; }

  DB = await Store.load();

  if(loginBtn){ loginBtn.disabled = false; loginBtn.textContent = "Log In"; }

  populateLoginBranding();
  setLoginRole("admin");
  tryResumeSession();

  // Live updates: if Admin (on any device) saves, this screen refreshes automatically.
  Store.subscribeRemote((cloudDB)=>{
    DB = cloudDB;
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }catch(e){}
    refreshCurrentView();
  });
})();
</script>
